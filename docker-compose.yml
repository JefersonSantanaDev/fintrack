name: fintrack

services:
  db:
    image: postgres:16-alpine
    container_name: fintrack-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fintrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - fintrack_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fintrack"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: fintrack-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      FRONTEND_URL: http://localhost:5173
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fintrack?schema=public
      JWT_ACCESS_SECRET: replace-with-strong-access-secret
      JWT_REFRESH_SECRET: replace-with-strong-refresh-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_SALT_ROUNDS: 10
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm run prisma:generate && npx prisma migrate deploy && npm run start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: fintrack-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000/api
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  fintrack_pgdata:
